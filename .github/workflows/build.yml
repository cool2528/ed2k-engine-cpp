name: build

# R0-2/R0-3 CI scaffolding. Matrix build (Windows MSVC + Ubuntu GCC) via vcpkg manifest.
# Live tests skip by default (no ED2K_LIVE) — they need a real eMule server (R0-1).
# NOTE: authored without a Linux/CI environment to validate; first push to GitHub runs it.
#       If a step fails, fix in-repo (preset/portability) rather than disabling the matrix.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.os }} (${{ matrix.preset }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: default
            vcpkg: C:\vcpkg
          - os: ubuntu-latest
            preset: linux
            vcpkg: /usr/local/vcpkg

    env:
      VCPKG_ROOT: ${{ matrix.vcpkg }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up vcpkg
        shell: bash
        run: |
          # GitHub runners ship vcpkg at the matrix path; export VCPKG_ROOT for the toolchain.
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> "$GITHUB_ENV"
          "$VCPKG_ROOT/vcpkg" --version || true

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build build/default

      - name: Test
        working-directory: build/default
        run: ctest --preset ${{ matrix.preset }}
