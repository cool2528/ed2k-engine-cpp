name: build

# R0-2/R0-3 CI. Matrix build (Windows MSVC + Ubuntu GCC) via vcpkg manifest mode.
# Live tests skip by default (no ED2K_LIVE) — they need a real eMule server (R0-1).
#
# vcpkg: a fresh full clone is pinned to the vcpkg.json builtin-baseline commit
# (cached across runs by baseline). This sidesteps runner-image vcpkg state
# (local port modifications on Linux, version drift on Windows). vcpkg manifest
# versioning requires a *full* (non-shallow) clone at >= the baseline commit so
# the version database has every entry the baseline references.
#
# Windows pins to windows-2022 (VS 2022) to match the `default` preset's
# "Visual Studio 17 2022" generator; windows-latest now ships VS 18 (2025).
# Compiled deps are cached via the x-gha binary source (GitHub Actions cache).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build:
    name: ${{ matrix.os }} (${{ matrix.preset }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            preset: default
            binary_dir: build/default
            configuration: Debug
            install_dir: build/stage-default
            dependency_dir: build/default/vcpkg_installed/x64-windows
            consumer_dir: build/consumer-default
            consumer_configure_args: ""
            consumer_exe: build/consumer-default/Debug/ed2k_consumer.exe
          - os: windows-2022
            preset: default-release
            binary_dir: build/default-release
            configuration: Release
            install_dir: build/stage-default-release
            dependency_dir: build/default-release/vcpkg_installed/x64-windows
            consumer_dir: build/consumer-default-release
            consumer_configure_args: ""
            consumer_exe: build/consumer-default-release/Release/ed2k_consumer.exe
          - os: ubuntu-latest
            preset: linux
            binary_dir: build/linux
            configuration: Debug
            install_dir: build/stage-linux
            dependency_dir: build/linux/vcpkg_installed/x64-linux
            consumer_dir: build/consumer-linux
            consumer_configure_args: -DCMAKE_BUILD_TYPE=Debug
            consumer_exe: build/consumer-linux/ed2k_consumer
          - os: ubuntu-latest
            preset: linux-release
            binary_dir: build/linux-release
            configuration: Release
            install_dir: build/stage-linux-release
            dependency_dir: build/linux-release/vcpkg_installed/x64-linux
            consumer_dir: build/consumer-linux-release
            consumer_configure_args: -DCMAKE_BUILD_TYPE=Release
            consumer_exe: build/consumer-linux-release/ed2k_consumer

    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache credentials
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Read vcpkg baseline
        id: baseline
        shell: bash
        run: |
          BASELINE=$(grep builtin-baseline vcpkg.json | head -1 | sed 's/.*"\([0-9a-f]\{40\}\)".*/\1/')
          echo "commit=$BASELINE" >> "$GITHUB_OUTPUT"
          echo "Baseline commit: $BASELINE"

      - name: Cache vcpkg clone
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/vcpkg
          key: vcpkg-${{ steps.baseline.outputs.commit }}

      - name: Set up vcpkg (full clone at baseline commit)
        shell: bash
        run: |
          set -e
          VCPKG_DIR="$RUNNER_TEMP/vcpkg"
          if [ ! -d "$VCPKG_DIR/.git" ]; then
            git clone https://github.com/microsoft/vcpkg.git "$VCPKG_DIR"
          fi
          # Pin to the exact baseline commit (full history present → version
          # database matches vcpkg.json). Force discards any restored-tree drift.
          git -C "$VCPKG_DIR" fetch --tags origin
          git -C "$VCPKG_DIR" checkout -f "${{ steps.baseline.outputs.commit }}"
          "$VCPKG_DIR/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$VCPKG_DIR" >> "$GITHUB_ENV"
          "$VCPKG_DIR/vcpkg" --version

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

      - name: Install
        run: cmake --install ${{ matrix.binary_dir }} --config ${{ matrix.configuration }} --prefix "${{ github.workspace }}/${{ matrix.install_dir }}"

      - name: Configure consumer
        run: cmake -S tests/consumer -B ${{ matrix.consumer_dir }} -DCMAKE_PREFIX_PATH="${{ github.workspace }}/${{ matrix.install_dir }};${{ github.workspace }}/${{ matrix.dependency_dir }}" -DCMAKE_TOOLCHAIN_FILE="${{ runner.temp }}/vcpkg/scripts/buildsystems/vcpkg.cmake" ${{ matrix.consumer_configure_args }}

      - name: Build consumer
        run: cmake --build ${{ matrix.consumer_dir }} --config ${{ matrix.configuration }}

      - name: Run consumer
        shell: bash
        run: ${{ matrix.consumer_exe }}
